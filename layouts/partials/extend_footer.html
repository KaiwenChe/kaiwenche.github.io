<script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.3.0/js/glightbox.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    // Wrap every post image in a GLightbox-compatible link
    document.querySelectorAll('.post-content img').forEach(function (img) {
        if (img.closest('a')) return; // already wrapped
        var a = document.createElement('a');
        a.href = img.src;
        a.classList.add('glightbox');
        a.setAttribute('data-glightbox', 'description: ' + (img.alt || ''));
        img.parentNode.insertBefore(a, img);
        a.appendChild(img);
    });
    GLightbox({
        selector: '.glightbox',
        closeOnOutsideClick: true
    });
});
</script>
